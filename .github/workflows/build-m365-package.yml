name: Build M365 Package

on:
  push:
    paths:
      - "mvp/appPackage/**"
      - "mvp/scripts/build-m365-app-package.sh"
  workflow_dispatch:
    inputs:
      app_version:
        description: "Optional app version override"
        required: false
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Build Package Artifact
    runs-on: ubuntu-latest
    env:
      BOT_APP_ID: ${{ vars.M365_PACKAGE_BOT_APP_ID || '11111111-1111-1111-1111-111111111111' }}
      BOT_SSO_APP_ID: ${{ vars.M365_PACKAGE_BOT_SSO_APP_ID || vars.M365_PACKAGE_BOT_APP_ID || '11111111-1111-1111-1111-111111111111' }}
      BOT_SSO_RESOURCE: ${{ vars.M365_PACKAGE_BOT_SSO_RESOURCE || 'api://botid-11111111-1111-1111-1111-111111111111' }}
      WRAPPER_BASE_URL: ${{ vars.M365_PACKAGE_WRAPPER_BASE_URL || 'https://example.invalid' }}
      M365_APP_PACKAGE_ID: ${{ vars.M365_PACKAGE_ID || '22222222-2222-2222-2222-222222222222' }}
      APP_VERSION: ${{ github.event.inputs.app_version || format('0.0.0-build.{0}', github.run_number) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        env:
          ENV_FILE: ${{ runner.temp }}/empty.env
        run: |
          touch "$ENV_FILE"
          bash mvp/scripts/build-m365-app-package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: m365-package-${{ github.sha }}
          path: |
            mvp/appPackage/build/daily-account-planner-m365.zip
            mvp/appPackage/build/manifest.json
          if-no-files-found: error
