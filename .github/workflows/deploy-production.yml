name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Integration release SHA to promote"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Secure Customer Production
    runs-on: ubuntu-latest
    environment: production
    env:
      MODE: secure
      PROFILE: secure-customer
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACA_ENVIRONMENT_NAME: ${{ vars.ACA_ENVIRONMENT_NAME }}
      PLANNER_ACA_APP_NAME: ${{ vars.PLANNER_ACA_APP_NAME }}
      WRAPPER_ACA_APP_NAME: ${{ vars.WRAPPER_ACA_APP_NAME }}
      AZURE_OPENAI_ACCOUNT_NAME: ${{ vars.AZURE_OPENAI_ACCOUNT_NAME }}
      AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
      PLANNER_API_CLIENT_ID: ${{ vars.PLANNER_API_CLIENT_ID }}
      PLANNER_API_EXPECTED_AUDIENCE: ${{ vars.PLANNER_API_EXPECTED_AUDIENCE }}
      PLANNER_API_SCOPE: ${{ vars.PLANNER_API_SCOPE }}
      BOT_APP_ID: ${{ vars.BOT_APP_ID }}
      BOT_SSO_APP_ID: ${{ vars.BOT_SSO_APP_ID }}
      BOT_SSO_RESOURCE: ${{ vars.BOT_SSO_RESOURCE }}
      CUSTOMER_DATABRICKS_HOST: ${{ vars.CUSTOMER_DATABRICKS_HOST }}
      CUSTOMER_DATABRICKS_AZURE_RESOURCE_ID: ${{ vars.CUSTOMER_DATABRICKS_AZURE_RESOURCE_ID }}
      CUSTOMER_DATABRICKS_OBO_SCOPE: ${{ vars.CUSTOMER_DATABRICKS_OBO_SCOPE }}
      CUSTOMER_DATABRICKS_WAREHOUSE_ID: ${{ vars.CUSTOMER_DATABRICKS_WAREHOUSE_ID }}
      CUSTOMER_TOP_OPPORTUNITIES_SOURCE: ${{ vars.CUSTOMER_TOP_OPPORTUNITIES_SOURCE }}
      CUSTOMER_CONTACTS_SOURCE: ${{ vars.CUSTOMER_CONTACTS_SOURCE }}
      CUSTOMER_SCOPE_ACCOUNTS_CATALOG: ${{ vars.CUSTOMER_SCOPE_ACCOUNTS_CATALOG }}
      CUSTOMER_SALES_TEAM_MAPPING_CATALOG: ${{ vars.CUSTOMER_SALES_TEAM_MAPPING_CATALOG }}
      CUSTOMER_REP_LOOKUP_STATIC_MAP_JSON_PATH: ${{ vars.CUSTOMER_REP_LOOKUP_STATIC_MAP_JSON_PATH }}
      WRAPPER_ENABLE_DEBUG_CHAT: ${{ vars.WRAPPER_ENABLE_DEBUG_CHAT }}
      WRAPPER_DEBUG_ALLOWED_UPNS: ${{ vars.WRAPPER_DEBUG_ALLOWED_UPNS }}
      WRAPPER_DEBUG_EXPECTED_AUDIENCE: ${{ vars.WRAPPER_DEBUG_EXPECTED_AUDIENCE }}
      ACA_MIN_REPLICAS: ${{ vars.ACA_MIN_REPLICAS }}
      ACA_MAX_REPLICAS: ${{ vars.ACA_MAX_REPLICAS }}
      KEYVAULT_NAME: ${{ vars.KEYVAULT_NAME }}
      KEYVAULT_PLANNER_API_CLIENT_SECRET_NAME: ${{ vars.KEYVAULT_PLANNER_API_CLIENT_SECRET_NAME }}
      KEYVAULT_BOT_APP_PASSWORD_NAME: ${{ vars.KEYVAULT_BOT_APP_PASSWORD_NAME }}
      KEYVAULT_PLANNER_API_BEARER_TOKEN_NAME: ${{ vars.KEYVAULT_PLANNER_API_BEARER_TOKEN_NAME }}
      PLANNER_API_CLIENT_SECRET: ${{ secrets.PLANNER_API_CLIENT_SECRET }}
      BOT_APP_PASSWORD: ${{ secrets.BOT_APP_PASSWORD }}
      PLANNER_API_BEARER_TOKEN: ${{ secrets.PLANNER_API_BEARER_TOKEN }}
      VALIDATE_USER_UPN: ${{ vars.VALIDATE_USER_UPN }}
      AZURE_OPENAI_AUTO_ROLE_ASSIGN: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve promoted release SHA
        id: resolve-release
        uses: actions/github-script@v7
        with:
          script: |
            const inputSha = `${{ github.event.inputs.release_sha || '' }}`.trim();
            if (inputSha) {
              core.setOutput("release_sha", inputSha);
              return;
            }
            if (context.eventName !== "push") {
              core.setOutput("release_sha", context.sha);
              return;
            }
            const response = await github.request("GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pull = response.data.find((item) => item.base?.ref === "main") || response.data[0];
            core.setOutput("release_sha", pull?.head?.sha || context.sha);
      - uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Download promoted release metadata artifact
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ARTIFACT_NAME: release-metadata-${{ steps.resolve-release.outputs.release_sha }}
          RELEASE_SHA: ${{ steps.resolve-release.outputs.release_sha }}
          OUTPUT_DIR: ${{ runner.temp }}/release-metadata
          WORKFLOW_FILE: ci.yml
          WAIT_SECONDS: 600
        run: bash mvp/infra/scripts/ci-download-release-artifact.sh
      - name: Fetch deployment secrets from Key Vault
        shell: bash
        run: |
          set -euo pipefail
          fetch_secret() {
            local env_name="$1"
            local secret_name="$2"
            if [[ -n "${!env_name:-}" ]]; then
              return 0
            fi
            if [[ -z "$secret_name" ]]; then
              return 0
            fi
            local secret_value
            secret_value="$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$secret_name" --query value -o tsv)"
            {
              echo "${env_name}<<EOF"
              echo "$secret_value"
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          fetch_secret "PLANNER_API_CLIENT_SECRET" "$KEYVAULT_PLANNER_API_CLIENT_SECRET_NAME"
          fetch_secret "BOT_APP_PASSWORD" "$KEYVAULT_BOT_APP_PASSWORD_NAME"
          fetch_secret "PLANNER_API_BEARER_TOKEN" "$KEYVAULT_PLANNER_API_BEARER_TOKEN_NAME"
      - name: Render ephemeral runtime env
        env:
          OUTPUT_ENV_FILE: ${{ runner.temp }}/production.env
          RELEASE_METADATA_PATH: ${{ runner.temp }}/release-metadata/release-metadata.json
        run: bash mvp/infra/scripts/ci-render-runtime-env.sh
      - name: Deploy planner and wrapper
        env:
          ENV_FILE: ${{ runner.temp }}/production.env
          DEPLOY_TARGET: production
        run: bash mvp/infra/scripts/ci-deploy-stack.sh
      - name: Run production smoke validation
        shell: bash
        env:
          ENV_FILE: ${{ runner.temp }}/production.env
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source <(sed 's/\r$//' "$ENV_FILE")
          set +a

          if [[ -n "${PLANNER_API_BEARER_TOKEN:-}" ]]; then
            ENV_FILE="$ENV_FILE" bash mvp/infra/scripts/validate-planner-service-e2e.sh
          else
            curl -fsS "${PLANNER_API_BASE_URL%/}/healthz"
            echo
          fi

          if [[ -n "${WRAPPER_BASE_URL:-}" ]]; then
            curl -fsS "${WRAPPER_BASE_URL%/}/healthz"
            echo
          fi

          if [[ -n "${VALIDATE_USER_UPN:-}" ]]; then
            ENV_FILE="$ENV_FILE" VALIDATE_USER_UPN="$VALIDATE_USER_UPN" \
              bash mvp/infra/scripts/validate-customer-vpower-query.sh
          fi
      - name: Write production deployment summaries
        shell: bash
        run: |
          set -euo pipefail
          INPUT_ENV_FILE="${{ runner.temp }}/production.env" \
          OUTPUT_ENV_FILE="${{ runner.temp }}/production.env.redacted" \
            bash mvp/infra/scripts/ci-redact-env-file.sh
          cat <<EOF > "${{ runner.temp }}/production-deployment-summary.txt"
          release_sha=${{ steps.resolve-release.outputs.release_sha }}
          mode=secure
          profile=secure-customer
          runtime_env=${{ runner.temp }}/production.env
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: production-deployment-summary-${{ steps.resolve-release.outputs.release_sha }}
          path: |
            ${{ runner.temp }}/production.env.redacted
            ${{ runner.temp }}/production-deployment-summary.txt
          if-no-files-found: error
