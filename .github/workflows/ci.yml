name: CI

on:
  pull_request:
    branches:
      - dev
      - integration
      - main
  push:
    branches:
      - dev
      - integration
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.MD"
      - "mvp/.env.example"
      - "mvp/.env.secure.example"
      - "mvp/.env.inputs.example"
      - "mvp/.env.secure.inputs.example"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      planner_runtime: ${{ steps.filter.outputs.planner_runtime }}
      wrapper_runtime: ${{ steps.filter.outputs.wrapper_runtime }}
      infra_runtime: ${{ steps.filter.outputs.infra_runtime }}
      m365_package: ${{ steps.filter.outputs.m365_package }}
      local_dev_only: ${{ steps.classify.outputs.local_dev_only }}
      ci_relevant: ${{ steps.classify.outputs.ci_relevant }}
      deploy_relevant: ${{ steps.classify.outputs.deploy_relevant }}
      package_relevant: ${{ steps.classify.outputs.package_relevant }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            docs_only:
              - '**/*.md'
              - '**/*.MD'
              - 'mvp/.env.example'
              - 'mvp/.env.secure.example'
              - 'mvp/.env.inputs.example'
              - 'mvp/.env.secure.inputs.example'
            planner_runtime:
              - 'mvp/agents/**'
              - 'mvp/agents/Dockerfile'
            wrapper_runtime:
              - 'mvp/m365_wrapper/**'
              - 'mvp/m365_wrapper/Dockerfile'
            infra_runtime:
              - 'mvp/infra/bicep/**'
              - 'mvp/infra/databricks/**'
              - 'mvp/infra/scripts/bootstrap-*.sh'
              - 'mvp/infra/scripts/build-and-deploy-*.sh'
              - 'mvp/infra/scripts/ci-*.sh'
              - 'mvp/infra/scripts/deploy-*.sh'
              - 'mvp/infra/scripts/validate-*.sh'
              - 'mvp/infra/tests/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy-*.yml'
              - '.github/workflows/bootstrap-foundation.yml'
            m365_package:
              - 'mvp/appPackage/**'
              - 'mvp/scripts/build-m365-app-package.sh'
              - '.github/workflows/build-m365-package.yml'
              - '.github/workflows/publish-teams-catalog.yml'
            local_dev_only:
              - 'mvp/dev_ui/**'
              - 'mvp/infra/scripts/run-local-*.sh'
              - 'mvp/infra/scripts/setup-local-debug-public-client.sh'
              - 'mvp/scripts/get-local-debug-token.py'
      - id: classify
        shell: bash
        run: |
          set -euo pipefail
          planner="${{ steps.filter.outputs.planner_runtime }}"
          wrapper="${{ steps.filter.outputs.wrapper_runtime }}"
          infra="${{ steps.filter.outputs.infra_runtime }}"
          package="${{ steps.filter.outputs.m365_package }}"
          local_only="${{ steps.filter.outputs.local_dev_only }}"

          ci_relevant=false
          deploy_relevant=false
          package_relevant=false
          local_dev_only=false

          if [[ "$planner" == "true" || "$wrapper" == "true" || "$infra" == "true" || "$package" == "true" ]]; then
            ci_relevant=true
          fi
          if [[ "$planner" == "true" || "$wrapper" == "true" || "$infra" == "true" ]]; then
            deploy_relevant=true
          fi
          if [[ "$package" == "true" ]]; then
            package_relevant=true
          fi
          if [[ "$local_only" == "true" && "$planner" != "true" && "$wrapper" != "true" && "$infra" != "true" && "$package" != "true" ]]; then
            local_dev_only=true
          fi

          {
            echo "ci_relevant=$ci_relevant"
            echo "deploy_relevant=$deploy_relevant"
            echo "package_relevant=$package_relevant"
            echo "local_dev_only=$local_dev_only"
          } >> "$GITHUB_OUTPUT"

  python-tests:
    name: Python Tests (${{ matrix.name }})
    needs: changes
    if: github.event_name == 'pull_request' || needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: infra
            command: uv run --project mvp python -m pytest -q mvp/infra/tests
          - name: wrapper-ui
            command: uv run --project mvp python -m pytest -q mvp/m365_wrapper/tests mvp/dev_ui/tests
          - name: agents
            command: uv run --project mvp python -m pytest -q mvp/agents/tests
    steps:
      - name: Skip Python Tests
        if: needs.changes.outputs.ci_relevant != 'true' && needs.changes.outputs.local_dev_only != 'true'
        run: echo "Docs-only or env-template-only change; Python tests intentionally skipped."
      - uses: actions/checkout@v5
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
      - uses: actions/setup-python@v6
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
      - run: uv sync --project mvp --group dev
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
      - run: ${{ matrix.command }}
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'

  shell-validation:
    name: Shell Validation
    needs: changes
    if: github.event_name == 'pull_request' || needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip Shell Validation
        if: needs.changes.outputs.ci_relevant != 'true' && needs.changes.outputs.local_dev_only != 'true'
        run: echo "Docs-only or env-template-only change; shell validation intentionally skipped."
      - uses: actions/checkout@v5
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
      - name: Validate infra scripts
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script_path; do
            bash -n "$script_path"
          done < <(find mvp/infra/scripts -maxdepth 1 -type f -name '*.sh' | sort)
      - name: Validate selected repo scripts
        if: needs.changes.outputs.ci_relevant == 'true' || needs.changes.outputs.local_dev_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script_path; do
            bash -n "$script_path"
          done < <(find mvp/scripts -maxdepth 1 -type f -name '*.sh' | sort)

  docker-build-smoke:
    name: Docker Build Smoke
    needs: changes
    if: github.event_name == 'pull_request' || needs.changes.outputs.deploy_relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip Docker Build Smoke
        if: needs.changes.outputs.deploy_relevant != 'true'
        run: echo "No deploy-relevant changes; Docker smoke build intentionally skipped."
      - uses: actions/checkout@v5
        if: needs.changes.outputs.deploy_relevant == 'true'
      - name: Build planner image locally
        if: needs.changes.outputs.deploy_relevant == 'true'
        run: docker build -f mvp/agents/Dockerfile -t planner-smoke:ci mvp
      - name: Build wrapper image locally
        if: needs.changes.outputs.deploy_relevant == 'true'
        run: docker build -f mvp/m365_wrapper/Dockerfile -t wrapper-smoke:ci mvp

  package-m365:
    name: Package M365 Artifact
    needs: changes
    if: github.event_name == 'pull_request' || needs.changes.outputs.package_relevant == 'true' || needs.changes.outputs.wrapper_runtime == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip Package Build
        if: needs.changes.outputs.package_relevant != 'true' && needs.changes.outputs.wrapper_runtime != 'true'
        run: echo "No package-relevant changes; M365 package build intentionally skipped."
      - uses: actions/checkout@v5
        if: needs.changes.outputs.package_relevant == 'true' || needs.changes.outputs.wrapper_runtime == 'true'
      - uses: actions/setup-python@v6
        if: needs.changes.outputs.package_relevant == 'true' || needs.changes.outputs.wrapper_runtime == 'true'
        with:
          python-version: "3.12"
      - name: Build package with CI-safe placeholders
        if: needs.changes.outputs.package_relevant == 'true' || needs.changes.outputs.wrapper_runtime == 'true'
        env:
          ENV_FILE: ${{ runner.temp }}/empty.env
          BOT_APP_ID: 11111111-1111-1111-1111-111111111111
          BOT_SSO_APP_ID: 11111111-1111-1111-1111-111111111111
          BOT_SSO_RESOURCE: api://botid-11111111-1111-1111-1111-111111111111
          WRAPPER_BASE_URL: https://example.invalid
          M365_APP_PACKAGE_ID: 22222222-2222-2222-2222-222222222222
          APP_VERSION: 0.0.0-ci.${{ github.run_number }}
        run: |
          touch "$ENV_FILE"
          bash mvp/scripts/build-m365-app-package.sh
      - uses: actions/upload-artifact@v6
        if: needs.changes.outputs.package_relevant == 'true' || needs.changes.outputs.wrapper_runtime == 'true'
        with:
          name: m365-package-${{ github.sha }}
          path: |
            mvp/appPackage/build/daily-account-planner-m365.zip
            mvp/appPackage/build/manifest.json
          if-no-files-found: error

  build-release-artifacts:
    name: Build Release Artifacts
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'integration' &&
      needs.changes.outputs.deploy_relevant == 'true' &&
      needs.python-tests.result == 'success' &&
      needs.shell-validation.result == 'success' &&
      needs.docker-build-smoke.result == 'success' &&
      (needs.package-m365.result == 'success' || needs.package-m365.result == 'skipped')
    runs-on: ubuntu-latest
    needs:
      - changes
      - python-tests
      - shell-validation
      - docker-build-smoke
      - package-m365
    environment: integration
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ACR_NAME: ${{ vars.ACR_NAME }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Build planner and wrapper images in ACR
        id: build-images
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          planner_repository="daily-account-planner/planner"
          wrapper_repository="daily-account-planner/wrapper"
          planner_tag="secure-${short_sha}"
          wrapper_tag="secure-${short_sha}"
          planner_image="${ACR_NAME}.azurecr.io/${planner_repository}:${planner_tag}"
          wrapper_image="${ACR_NAME}.azurecr.io/${wrapper_repository}:${wrapper_tag}"

          az acr build \
            --registry "$ACR_NAME" \
            --image "${planner_repository}:${planner_tag}" \
            --file "mvp/agents/Dockerfile" \
            "mvp"

          az acr build \
            --registry "$ACR_NAME" \
            --image "${wrapper_repository}:${wrapper_tag}" \
            --file "mvp/m365_wrapper/Dockerfile" \
            "mvp"

          planner_digest="$(az acr repository show --name "$ACR_NAME" --image "${planner_repository}:${planner_tag}" --query digest -o tsv 2>/dev/null || true)"
          wrapper_digest="$(az acr repository show --name "$ACR_NAME" --image "${wrapper_repository}:${wrapper_tag}" --query digest -o tsv 2>/dev/null || true)"

          {
            echo "PLANNER_IMAGE=$planner_image"
            echo "PLANNER_IMAGE_DIGEST=$planner_digest"
            echo "WRAPPER_IMAGE=$wrapper_image"
            echo "WRAPPER_IMAGE_DIGEST=$wrapper_digest"
          } >> "$GITHUB_ENV"
      - name: Write release metadata
        env:
          OUTPUT_PATH: ${{ runner.temp }}/release-metadata.json
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          PLANNER_IMAGE: ${{ env.PLANNER_IMAGE }}
          PLANNER_IMAGE_DIGEST: ${{ env.PLANNER_IMAGE_DIGEST }}
          WRAPPER_IMAGE: ${{ env.WRAPPER_IMAGE }}
          WRAPPER_IMAGE_DIGEST: ${{ env.WRAPPER_IMAGE_DIGEST }}
          M365_PACKAGE_ARTIFACT_NAME: m365-package-${{ github.sha }}
        run: bash mvp/infra/scripts/ci-write-release-metadata.sh
      - uses: actions/upload-artifact@v6
        with:
          name: release-metadata-${{ github.sha }}
          path: ${{ runner.temp }}/release-metadata.json
          if-no-files-found: error
