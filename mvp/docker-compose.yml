services:
  planner-service:
    build:
      context: .
      dockerfile: agents/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8001"
      TOP_OPPORTUNITIES_APP_BASE_URL: "http://top-opportunities-app:8002"
    ports:
      - "8001:8001"

  top-opportunities-app:
    build:
      context: .
      dockerfile: databricks_apps/top_opportunities_app/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8002"
    ports:
      - "8002:8002"

  m365-wrapper:
    build:
      context: .
      dockerfile: m365_wrapper/Dockerfile
    depends_on:
      - planner-service
      - mcp-server
    env_file:
      - .env
    environment:
      PORT: "3978"
      PLANNER_SERVICE_BASE_URL: "http://planner-service:8080"
      MCP_BASE_URL: "http://mcp-server:8001/mcp"
    ports:
      - "3978:3978"

  dev-ui:
    build:
      context: .
      dockerfile: dev_ui/Dockerfile
    depends_on:
      - planner-service
    environment:
      DEV_UI_PLANNER_BASE_URL: "http://planner-service:8080"
    ports:
      - "8010:8010"
